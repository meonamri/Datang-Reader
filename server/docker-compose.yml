services:
  datang-reader:
    build:
      context: .
      dockerfile: Dockerfile
    image: datang-reader:latest
    container_name: datang-reader

    # Port mapping: host:container
    # Override with DATANG_HOST_PORT in .env (default: 8080)
    ports:
      - "${DATANG_HOST_PORT:-8080}:8080"

    # Environment variables for configuration
    # IMPORTANT: Set these values or use .env file
    environment:
      # Container timezone. The school is in Malaysia (UTC+8); without this the
      # container runs in UTC, so IDME cutoff times and the daily scan-date
      # boundary would be 8h off. Cutoff times below are interpreted in THIS zone.
      - TZ=${TZ:-Asia/Kuala_Lumpur}

      # === Datang API Configuration ===
      - DATANG_API_BASE_URL=${DATANG_API_BASE_URL}
      - DATANG_READER_USERNAME=${DATANG_READER_USERNAME}
      - DATANG_READER_PASSWORD=${DATANG_READER_PASSWORD}
      - DATANG_DEVICE_ID=${DATANG_DEVICE_ID:-docker-reader}
      - DATANG_MOCK_API=${DATANG_MOCK_API:-false}

      # === IDME Module (Optional) ===
      - IDME_ENABLED=${IDME_ENABLED:-false}
      # Two-session school: upper forms (3-6) submit at the morning cutoff,
      # lower forms (1-2) at the afternoon cutoff. IDME_CUTOFF_TIME (legacy
      # single cutoff) is the morning fallback.
      - IDME_CUTOFF_TIME=${IDME_CUTOFF_TIME:-12:00}
      - IDME_CUTOFF_TIME_MORNING=${IDME_CUTOFF_TIME_MORNING:-}
      - IDME_CUTOFF_TIME_EVENING=${IDME_CUTOFF_TIME_EVENING:-16:00}
      # Scheduler auto-confirm. Default false = scheduled submits save re-editable
      # DRAFTS (MENUNGGU PENGESAHAN). Set true ONLY after a supervised period —
      # true auto-confirms LOCKED (TELAH DISAHKAN) records daily, unattended.
      - IDME_SCHEDULER_CONFIRM=${IDME_SCHEDULER_CONFIRM:-false}
      - IDME_ENCRYPTION_KEY=${IDME_ENCRYPTION_KEY:-}
      - IDME_DEBUG=${IDME_DEBUG:-false}
      - IDME_DATABASE_PATH=/data/idme/idme_data.db

    # Volume mounts for persistent data
    volumes:
      # Datang authentication token
      - ../docker-data/token:/root/.datang_reader_token

      # Datang offline queue database
      - ../docker-data/queue.db:/root/.datang_reader_queue.db

      # Logs
      - ../docker-data/logs:/data/logs

      # IDME data (database, screenshots)
      - ../docker-data/idme:/data/idme

    # Restart policy
    restart: unless-stopped

    # Health check (uses built-in Dockerfile HEALTHCHECK)
    # Docker will monitor /health endpoint and restart if unhealthy

    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    # Resource limits (optional, adjust based on your needs)
    # Note: Playwright/Firefox needs more memory than before (~512M recommended)
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '1.0'
    #       memory: 512M
    #     reservations:
    #       cpus: '0.25'
    #       memory: 256M

# Networks (using default bridge network)
networks:
  default:
    driver: bridge
